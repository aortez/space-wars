# Cross-compile target config.
#
# Windows builds use `cargo zigbuild --target x86_64-pc-windows-gnu`
# (cargo-zigbuild + Zig provides the linker — no MinGW system package needed).
#
# aarch64 Linux manual cross-compile needs:
#   sudo apt install gcc-aarch64-linux-gnu
# (Yocto manages its own toolchain for kiosk builds.)

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
